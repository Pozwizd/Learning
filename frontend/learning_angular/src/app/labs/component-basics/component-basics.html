<h1>{{ title }}</h1>
<p>{{ message }}</p>

<!--
  type="button" важно: если кнопка внутри form, она не отправит форму по умолчанию.
  (click)="refreshMessage()" — подписка шаблона на DOM-событие click и вызов метода компонента.
  Для Java-разработчика это аналог "обработчик события -> вызов метода сервиса", но прямо в UI.
-->
<button type="button" (click)="refreshMessage()">Обновить сообщение</button>
<p><a routerLink="/">Назад к списку лабораторных</a></p>
